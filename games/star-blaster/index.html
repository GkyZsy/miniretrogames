<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Star Blaster</title>
  <link rel="stylesheet" href="../../shared/game-shell.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-shell">
    <div class="topbar">
      <div class="title">Star Blaster</div>
      <div class="hud">
        <div class="badge">Score: <span id="score">0</span></div>
        <div class="badge">Lives: <span id="lives">3</span></div>
        <button id="restart">Restart</button>
      </div>
    </div>

    <canvas id="game" width="640" height="480"></canvas>

    <div class="help">
      Move with <b>Arrow Keys</b> or <b>WASD</b>.
      Shoot with <b>Space</b>.
      Survive waves of pixel invaders.
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
